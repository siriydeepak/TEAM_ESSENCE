agent_id: aethershelf-bot
version: "2026.4.27"
workspace_root: "."

execution_mode:
  concurrency: true
  max_parallel_sessions: 10
  state_isolation: thread_local

skills:
  - name: EmailParser.skill
    type: local_skill
    path: ./EmailParser.skill
  - name: FluxAlgorithm.skill
    type: local_skill
    path: ./FluxAlgorithm.skill
  - name: CollisionDetection.skill
    type: local_skill
    path: ./CollisionDetection.skill
  - name: UtilityGapFinder.skill
    type: local_skill
    path: ./UtilityGapFinder.skill

triggers:
  - type: file_watcher
    target: pantry_ledger.yaml
    action: "FluxAlgorithm.skill.main"
